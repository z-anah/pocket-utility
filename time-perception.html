<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Time Perception Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    body { background: #fff; }
  </style>
</head>

<body class="text-black">
<div id="app" class="max-w-md mx-auto min-h-screen p-4">

  <!-- HEADER -->
  <div class="mb-4">
    <h1 class="text-xl font-bold">Time Perception</h1>
    <div class="h-1 w-12 bg-yellow-400 mt-1"></div>
  </div>

  <!-- INPUT -->
  <div class="p-4 border rounded-2xl mb-4">

    <input v-model="name"
      class="w-full p-3 border rounded-xl mb-2"
      placeholder="Task name" />

    <input v-model.number="estimate"
      type="number"
      class="w-full p-3 border rounded-xl mb-2"
      placeholder="Estimated minutes" />

    <button @click="addTask"
      class="w-full bg-yellow-400 text-black py-2 rounded-xl font-semibold">
      Add Task
    </button>

  </div>

  <!-- LIST -->
  <div class="space-y-3">

    <div v-for="(t, i) in tasks" :key="i"
      class="p-4 border rounded-2xl">

      <div class="flex justify-between items-center mb-2">
        <div class="font-semibold">{{ t.name }}</div>

        <button v-if="!t.running"
          @click="start(i)"
          class="text-xs px-3 py-1 border rounded-full">
          Start
        </button>

        <button v-else
          @click="stop(i)"
          class="text-xs px-3 py-1 bg-black text-white rounded-full">
          Stop
        </button>
      </div>

      <div class="text-xs text-gray-600">
        Estimated: {{ t.estimate }} min
      </div>

      <div v-if="t.actual !== null" class="text-xs mt-1">
        Actual: <span class="font-semibold">{{ t.actual }} min</span>
      </div>

      <div v-if="t.running" class="text-xs text-yellow-600 mt-1">
        Running...
      </div>

    </div>

  </div>

  <button @click="clearAll"
    class="mt-6 w-full text-xs border border-red-200 text-red-500 py-2 rounded-xl">
    Clear All
  </button>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      name: "",
      estimate: null,
      tasks: JSON.parse(localStorage.getItem("time_tasks") || "[]")
    };
  },

  methods: {
    addTask() {
      if (!this.name || !this.estimate) return;

      this.tasks.push({
        name: this.name,
        estimate: this.estimate,
        start: null,
        actual: null,
        running: false
      });

      this.save();

      this.name = "";
      this.estimate = null;
    },

    start(i) {
      this.tasks[i].start = Date.now();
      this.tasks[i].running = true;
      this.save();
    },

    stop(i) {
      const t = this.tasks[i];
      const diff = Date.now() - t.start;
      t.actual = Math.round(diff / 60000);
      t.running = false;
      t.start = null;
      this.save();
    },

    save() {
      localStorage.setItem("time_tasks", JSON.stringify(this.tasks));
    },

    clearAll() {
      this.tasks = [];
      this.save();
    }
  }
}).mount("#app");
</script>

</body>
</html>
