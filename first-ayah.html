<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Juz Amma Memorizer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    body { background:#fff; }

    .card {
      transition: transform 0.2s ease, background 0.25s ease;
      will-change: transform;
      touch-action: pan-y;
    }

    .done { background: #d1fae5; }
    .undone { background: #fff7ed; }

    .arabic {
      direction: rtl;
      font-family: serif;
      font-size: 22px;
      line-height: 2rem;
    }

    .fade {
      transition: all 0.25s ease;
    }

    .pop {
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.98); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>
<div id="app" class="max-w-md mx-auto min-h-screen">

  <!-- HEADER -->
  <div class="p-4 bg-yellow-300 font-bold flex justify-between items-center">
    <div>📖 Juz Amma</div>
    <button @click="togglePage" class="bg-black text-white px-3 py-1 rounded-full text-xs">
      {{ page === 'home' ? 'Progress' : 'Home' }}
    </button>
  </div>

  <!-- HOME -->
  <div v-if="page==='home'" class="p-3 space-y-3 pb-20">

    <div v-for="(s,i) in surahs"
      :key="s.number"
      class="card border rounded-xl p-3 shadow-sm"
      :class="s.memorized ? 'done' : 'undone'"
      :style="{ transform: 'translateX(' + s.offset + 'px)' }"

      @touchstart="startSwipe($event,i)"
      @touchmove="moveSwipe($event,i)"
      @touchend="endSwipe(i)"

      @click="handleTap(i)"
    >

      <!-- HEADER -->
      <div class="flex justify-between items-center">
        <div>
          <div class="text-xs text-gray-500">Surah {{ s.number }}</div>
          <div class="font-bold">{{ s.name }}</div>
        </div>

        <div class="text-xs text-gray-600">
          {{ s.memorized ? '✓ memorized' : 'swipe → done' }}
        </div>
      </div>

      <!-- AYAH (HIDDEN BY DEFAULT, DOUBLE TAP) -->
      <div v-if="s.showAyah"
           class="mt-3 bg-white p-3 rounded-lg border fade pop">

        <div class="arabic text-right">
          {{ s.ayah }}
        </div>

        <div class="text-[10px] text-gray-400 mt-2">
          auto hide in 5s
        </div>
      </div>

      <div v-else class="text-[11px] text-gray-400 mt-3">
        double tap to reveal ayah
      </div>

    </div>

  </div>

  <!-- PROGRESS -->
  <div v-if="page==='progress'" class="p-4 space-y-4">

    <div class="bg-yellow-100 p-4 rounded-xl border">
      <div class="text-sm font-bold">Progress</div>
      <div class="text-2xl font-bold">
        {{ progress }} / {{ surahs.length }}
      </div>

      <div class="h-3 bg-black/10 rounded-full mt-3 overflow-hidden">
        <div class="h-full bg-black transition-all"
          :style="{ width: (progress/surahs.length*100)+'%' }"></div>
      </div>
    </div>

    <button @click="reset"
      class="w-full bg-red-500 text-white py-2 rounded-xl">
      Reset
    </button>

  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      page: 'home',
      startX: 0,
      lastTap: {},
      surahs: []
    }
  },

  computed: {
    progress() {
      return this.surahs.filter(s => s.memorized).length;
    }
  },

  mounted() {
    this.load();
  },

  methods: {

    togglePage() {
      this.page = this.page === 'home' ? 'progress' : 'home';
    },

    load() {
      const saved = localStorage.getItem("juzamma");
      if (saved) {
        this.surahs = JSON.parse(saved);
      } else {
        this.surahs = this.defaultSurahs();
      }
    },

    save() {
      localStorage.setItem("juzamma", JSON.stringify(this.surahs));
    },

    /* SWIPE */
    startSwipe(e,i) {
      this.startX = e.touches[0].clientX;
    },

    moveSwipe(e,i) {
      this.surahs[i].offset = e.touches[0].clientX - this.startX;
    },

    endSwipe(i) {
      const diff = this.surahs[i].offset;

      if (diff > 80) this.surahs[i].memorized = true;
      if (diff < -80) this.surahs[i].memorized = false;

      this.surahs[i].offset = 0;
      this.save();
    },

    /* DOUBLE TAP */
    handleTap(i) {
      const now = Date.now();

      if (!this.lastTap[i]) this.lastTap[i] = 0;

      const diff = now - this.lastTap[i];

      if (diff < 300) {
        this.showAyah(i);
      }

      this.lastTap[i] = now;
    },

    showAyah(i) {
      this.surahs[i].showAyah = true;

      setTimeout(() => {
        this.surahs[i].showAyah = false;
      }, 5000);
    },

    reset() {
      localStorage.removeItem("juzamma");
      this.load();
    },

    defaultSurahs() {
      const names = [
        "An-Naba","An-Nazi at","Abasa","At-Takwir","Al-Infitar",
        "Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq",
        "Al-A la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams",
        "Al-Lail","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq",
        "Al-Qadr","Al-Bayyina","Az-Zalzalah","Al-Adiyat","Al-Qari ah",
        "At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh",
        "Al-Ma un","Al-Kawthar","Al-Kafirun","An-Nasr",
        "Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"
      ];

      return names.map((n, idx) => ({
        number: 78 + idx,
        name: n,
        ayah: "",
        memorized: false,
        showAyah: false,
        offset: 0
      }));
    }
  }
}).mount("#app");
</script>

</body>
</html>
