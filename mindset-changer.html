<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindset Changer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <style>
        body {
            background: #fff;
        }
    </style>
</head>

<body class="text-black">
    <div id="app" class="max-w-md mx-auto min-h-screen p-4">

        <!-- HEADER -->
        <div class="mb-4">
            <h1 class="text-xl font-bold">Mindset Changer</h1>
            <div class="h-1 w-12 bg-yellow-400 mt-1"></div>
        </div>

        <!-- PAGE 1: CATEGORY -->
        <div v-if="page==='category'">

            <div class="text-sm text-gray-600 mb-3">
                Choose your situation
            </div>

            <div class="space-y-3">
                <button v-for="c in categories" :key="c.id" @click="selectCategory(c)"
                    class="w-full text-left p-4 border rounded-xl active:scale-95">
                    <div class="font-semibold">{{ c.title }}</div>
                    <div class="text-xs text-gray-500">{{ c.subtitle }}</div>
                </button>
            </div>

        </div>

        <!-- PAGE 2: MINDSET -->
        <div v-if="page==='mindset'">

            <button @click="page='category'" class="text-xs mb-3 px-3 py-1 border rounded-full">
                Back
            </button>

            <div class="p-5 border rounded-2xl bg-yellow-50">
                <div class="text-xs text-gray-500 mb-2">Mindset</div>
                <div class="text-base font-medium leading-relaxed">
                    {{ selected?.mindset }}
                </div>
            </div>

            <button @click="goTask" class="mt-4 w-full bg-black text-white py-3 rounded-xl active:scale-95">
                Next: Task
            </button>

        </div>

        <!-- PAGE 3: TASK -->
        <div v-if="page==='task'">

            <button @click="page='mindset'" class="text-xs mb-3 px-3 py-1 border rounded-full">
                Back
            </button>

            <div class="p-5 border rounded-2xl mb-4">
                <div class="text-xs text-gray-500 mb-2">Simple Task</div>
                <div class="text-base font-semibold">
                    {{ selected?.task }}
                </div>
            </div>

            <!-- NOTES INPUT -->
            <div class="p-4 border rounded-2xl mb-4">
                <div class="text-xs text-gray-500 mb-2">Your Notes</div>

                <textarea v-model="note" placeholder="Write your reflection..."
                    class="w-full p-3 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
                    rows="4"></textarea>

                <button @click="saveNote"
                    class="mt-2 w-full bg-yellow-400 text-black py-2 rounded-xl text-sm font-semibold active:scale-95">
                    Save Note
                </button>
                <div v-if="selected?.examplenote" class="mt-3 text-xs text-gray-500 bg-yellow-50 p-2 rounded">
                    <span class="font-semibold">Example Islamic Note:</span> {{ selected.examplenote }}
                </div>
            </div>

            <!-- SAVED NOTES -->
            <div class="p-4 border rounded-2xl">
                <div class="text-xs text-gray-500 mb-2">Saved Notes</div>

                <div v-if="getNotes(selected?.id).length === 0" class="text-xs text-gray-400">
                    No notes yet
                </div>

                <div class="space-y-2">
                    <div v-for="(n, i) in getNotes(selected?.id)" :key="i" class="p-2 border rounded-lg text-xs">
                        {{ n }}
                    </div>
                </div>
            </div>

            <button @click="complete"
                class="mt-4 w-full bg-yellow-400 text-black py-3 rounded-xl font-semibold active:scale-95">
                Mark Done
            </button>

            <div v-if="done" class="mt-3 text-center text-sm text-green-600">
                Completed ✓ saved locally
            </div>

        </div>

    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    page: 'category',
                    done: false,
                    selected: null,
                    note: "",
                    categories: [
                        {
                            id: 1,
                            title: "Sad / Low Mood",
                            subtitle: "feeling down or unmotivated",
                            mindset: "Allah ﷻ is Al-Rahman, Al-Rahim. This state is temporary. Ease is near with the permission of Allah ﷻ. I hold onto sabr and hope.",
                            task: "Breathe deeply for 1 minute, then write 3 things you are grateful to Allah ﷻ for today.",
                            examplenote: "Alhamdulillah for my health, my family, and the ability to pray."
                        },
                        {
                            id: 2,
                            title: "Work Stress",
                            subtitle: "overwhelmed with tasks",
                            mindset: "Allah ﷻ is Al-Hakeem. Every effort I make is seen. I will proceed calmly, step by step, trusting Allah ﷻ while acting.",
                            task: "Write the next 3 small tasks only and focus on the first one.",
                            examplenote: "1. Reply to urgent email. 2. Finish report. 3. Take a 5-min break."
                        },
                        {
                            id: 3,
                            title: "No Job / Uncertainty",
                            subtitle: "career or financial stress",
                            mindset: "Allah ﷻ is Ar-Razzaq. My provision is written. I continue striving while placing full tawakkul in Allah ﷻ.",
                            task: "Apply to 1 opportunity or improve 1 skill for 15 minutes.",
                            examplenote: "Applied to a job on LinkedIn and watched a 15-min tutorial on Excel."
                        },
                        {
                            id: 4,
                            title: "Anxiety / Overthinking",
                            subtitle: "mental pressure and worry",
                            mindset: "Allah ﷻ is Al-Wakeel. I release control of what I cannot carry and return my heart to dhikr and trust in Allah ﷻ.",
                            task: "Do 10 slow breaths and repeat dhikr calmly.",
                            examplenote: "Did 10 deep breaths and recited 'Hasbunallahu wa ni'mal wakeel' 3 times."
                        },
                        {
                            id: 5,
                            title: "Comparison / Low Self-esteem",
                            subtitle: "feeling inferior to others",
                            mindset: "Allah ﷻ created every soul with unique purpose. My value is in my sincerity and effort for Allah ﷻ, not comparison.",
                            task: "Write 3 blessings from Allah ﷻ and 1 personal improvement.",
                            examplenote: "Blessings: Faith, loving parents, safe home. Improvement: Be kinder to myself."
                        },
                        {
                            id: 6,
                            title: "Negative Self-talk",
                            subtitle: "harsh inner critic",
                            mindset: "Allah ﷻ is Al-Ghaffur, Ar-Rahim. I replace harsh thoughts with mercy, truth, and remembrance of Allah ﷻ.",
                            task: "Write 1 negative thought and replace it with a positive truth.",
                            examplenote: "Negative: 'I'm not good enough.' Positive: 'Allah ﷻ created me with purpose and mercy.'"
                        },
                        {
                            id: 7,
                            title: "Doubt / Indecision",
                            subtitle: "difficulty making choices",
                            mindset: "I seek guidance from Allah ﷻ through istikhara and reflection. Whatever I choose with sincerity, I trust Allah ﷻ in it.",
                            task: "Write 1 decision and 3 reasons why it may be good.",
                            examplenote: "Decision: Take the new job. Reasons: Growth, halal income, new skills."
                        },
                        {
                            id: 8,
                            title: "Pessimism / Negative Outlook",
                            subtitle: "expecting the worst",
                            mindset: "Allah ﷻ is Al-Hafiz, the Preserver. I will focus on the positive possibilities, trust in Allah’s protection, and remember that after hardship comes ease.",
                            task: "Write 1 positive possibility for your current situation and say ‘InshaAllah’ to affirm hope and trust in Allah ﷻ.",
                            examplenote: "InshaAllah, this challenge will lead to something better for me."
                        },
                        {
                            id: 9,
                            title: "Just Feeling Off",
                            subtitle: "no specific reason, just not feeling right",
                            mindset: "Allah ﷻ is As-Salam, the Source of Peace. I will take care of myself with kindness, remember Allah’s peace, and trust that this feeling will pass.",
                            task: "Do 1 act of self-care and say a short prayer for ease.",
                            examplenote: "I took a short walk and said, 'Allahumma rahmataka arju, falaa takilnee ilaa nafsee tarfata 'ayn.'"
                        },
                        // i dream but do nothing about it
                        {
                            id: 10,
                            title: "Dreaming but Not Doing",
                            subtitle: "having goals but struggling to take action",
                            mindset: "Allah ﷻ is Al-Muqtadir, the All-Powerful. I will take one small step towards my goal today, trusting that Allah ﷻ will guide and empower me.",
                            task: "Write 1 small action you can take towards a dream and do it.",
                            examplenote: "I want to write a book. Today, I wrote the first paragraph."
                        },
                    ]
                };
            },

            methods: {
                selectCategory(c) {
                    this.selected = c;
                    localStorage.setItem('mindset_last', JSON.stringify(c));
                    this.page = 'mindset';
                    this.done = false;
                    this.note = "";
                },

                goTask() {
                    this.page = 'task';
                },

                saveNote() {
                    if (!this.selected) return;

                    const key = "notes_" + this.selected.id;
                    let notes = JSON.parse(localStorage.getItem(key) || "[]");

                    if (this.note.trim().length > 0) {
                        notes.push(this.note.trim());
                        localStorage.setItem(key, JSON.stringify(notes));
                        this.note = "";
                    }
                },

                getNotes(id) {
                    if (!id) return [];
                    return JSON.parse(localStorage.getItem("notes_" + id) || "[]");
                },

                complete() {
                    this.done = true;
                    localStorage.setItem('mindset_done', new Date().toISOString());
                }
            },

            mounted() {
                const last = localStorage.getItem('mindset_last');
                if (last) this.selected = JSON.parse(last);
            }
        }).mount('#app');
    </script>

</body>

</html>
