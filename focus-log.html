<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Focus Log</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    body { background: #fff; }
  </style>
</head>

<body class="text-black">
<div id="app" class="max-w-md mx-auto min-h-screen p-4">

  <!-- HEADER -->
  <div class="mb-4">
    <h1 class="text-xl font-bold">Focus Log</h1>
    <div class="h-1 w-12 bg-yellow-400 mt-1"></div>
  </div>

  <!-- ACTIONS -->
  <div class="grid grid-cols-2 gap-3 mb-4">

    <button @click="add('focus')"
      class="p-5 border rounded-2xl active:scale-95 bg-white">
      <div class="text-2xl">🟡</div>
      <div class="font-semibold">Focus</div>
    </button>

    <button @click="add('distraction')"
      class="p-5 border rounded-2xl active:scale-95 bg-white">
      <div class="text-2xl">⚫</div>
      <div class="font-semibold">Distraction</div>
    </button>

  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 gap-3 mb-4">

    <div class="p-4 border rounded-xl">
      <div class="text-xs text-gray-500">Focus</div>
      <div class="text-2xl font-bold">{{ count('focus') }}</div>
    </div>

    <div class="p-4 border rounded-xl">
      <div class="text-xs text-gray-500">Distraction</div>
      <div class="text-2xl font-bold">{{ count('distraction') }}</div>
    </div>

  </div>

  <!-- LOG LIST -->
  <div class="space-y-2">

    <div v-for="(l, i) in logs.slice().reverse()" :key="i"
      class="flex justify-between items-center p-3 border rounded-xl">

      <div class="flex items-center gap-2">
        <span v-if="l.type==='focus'">🟡</span>
        <span v-else>⚫</span>
        <div class="text-sm font-medium">{{ l.type }}</div>
      </div>

      <div class="text-xs text-gray-500">
        {{ format(l.time) }}
      </div>

    </div>

  </div>

  <button @click="clearAll"
    class="mt-6 w-full text-xs border border-red-200 text-red-500 py-2 rounded-xl">
    Clear All
  </button>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      logs: JSON.parse(localStorage.getItem("focus_logs") || "[]")
    };
  },

  methods: {
    add(type) {
      this.logs.push({
        type,
        time: new Date().toISOString()
      });
      this.save();
    },

    save() {
      localStorage.setItem("focus_logs", JSON.stringify(this.logs));
    },

    count(type) {
      return this.logs.filter(l => l.type === type).length;
    },

    format(t) {
      const d = new Date(t);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    },

    clearAll() {
      this.logs = [];
      this.save();
    }
  }
}).mount("#app");
</script>

</body>
</html>
