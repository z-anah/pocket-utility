<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decision Wheel</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    body { background: #fff; }
    canvas { touch-action: none; }
  </style>
</head>

<body class="text-black">
<div id="app" class="max-w-md mx-auto min-h-screen p-4">

  <!-- HEADER -->
  <div class="mb-4">
    <h1 class="text-xl font-bold">Decision Wheel</h1>
    <div class="h-1 w-12 bg-yellow-400 mt-1"></div>
  </div>

  <!-- PAGE: INPUT -->
  <div v-if="page==='edit'">

    <div class="text-sm text-gray-600 mb-2">
      Add options (one per line)
    </div>

    <textarea v-model="input"
      class="w-full h-40 p-3 border rounded-xl focus:ring-2 focus:ring-yellow-400"
      placeholder="Option 1&#10;Option 2&#10;Option 3"></textarea>

    <button @click="saveOptions"
      class="mt-3 w-full bg-yellow-400 text-black py-3 rounded-xl font-semibold">
      Save Wheel
    </button>

    <button @click="loadSaved"
      class="mt-2 w-full border py-2 rounded-xl text-sm">
      Load Saved
    </button>

  </div>

  <!-- PAGE: WHEEL -->
  <div v-if="page==='wheel'">

    <button @click="page='edit'"
      class="text-xs mb-3 px-3 py-1 border rounded-full">
      Edit
    </button>

    <div class="flex justify-center">
      <canvas ref="canvas" width="300" height="300"></canvas>
    </div>

    <button @click="spin"
      class="mt-4 w-full bg-black text-white py-3 rounded-xl">
      SPIN
    </button>

    <div v-if="result"
      class="mt-4 p-4 border rounded-xl text-center bg-yellow-50">
      <div class="text-xs text-gray-500">Result</div>
      <div class="text-lg font-bold">{{ result }}</div>
    </div>

  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      page: 'edit',
      input: "",
      options: [],
      angle: 0,
      spinning: false,
      result: null
    };
  },

  methods: {
    saveOptions() {
      this.options = this.input.split("\n").map(x => x.trim()).filter(Boolean);
      localStorage.setItem("wheel_options", JSON.stringify(this.options));
      this.page = "wheel";
      this.draw();
    },

    loadSaved() {
      const saved = localStorage.getItem("wheel_options");
      if (saved) {
        this.options = JSON.parse(saved);
        this.input = this.options.join("\n");
        this.page = "wheel";
        this.draw();
      }
    },

    draw() {
      const canvas = this.$refs.canvas;
      if (!canvas || this.options.length === 0) return;

      const ctx = canvas.getContext("2d");
      const size = canvas.width;
      const center = size / 2;
      const radius = center;

      ctx.clearRect(0, 0, size, size);

      const colors = ["#fff", "#fef08a"];

      const step = (Math.PI * 2) / this.options.length;

      for (let i = 0; i < this.options.length; i++) {
        const start = this.angle + i * step;
        const end = start + step;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[i % 2];
        ctx.fill();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(start + step / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = "12px sans-serif";
        ctx.fillText(this.options[i], radius - 10, 5);
        ctx.restore();
      }

      // pointer
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.moveTo(center - 10, 0);
      ctx.lineTo(center + 10, 0);
      ctx.lineTo(center, 15);
      ctx.fill();
    },

    spin() {
      if (this.spinning || this.options.length === 0) return;

      this.spinning = true;
      this.result = null;

      const spins = Math.random() * 2000 + 3000;
      const start = this.angle;
      const startTime = performance.now();

      const animate = (t) => {
        const progress = Math.min((t - startTime) / spins, 1);
        const ease = 1 - Math.pow(1 - progress, 3);

        this.angle = start + ease * Math.PI * 10;
        this.draw();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          this.spinning = false;
          this.pickResult();
        }
      };

      requestAnimationFrame(animate);
    },

    pickResult() {
      const step = (Math.PI * 2) / this.options.length;
      const normalized = (this.angle % (Math.PI * 2));
      const index = Math.floor((this.options.length - (normalized / step)) % this.options.length);
      this.result = this.options[index];
    }
  },

  mounted() {
    const saved = localStorage.getItem("wheel_options");
    if (saved) {
      this.options = JSON.parse(saved);
      this.input = this.options.join("\n");
      this.page = "wheel";
    }
    this.$nextTick(() => this.draw());
  }
}).mount("#app");
</script>

</body>
</html>
