<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pocket Utility</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <style>
        body {
            background: #ffffff;
        }
    </style>
</head>

<body class="min-h-screen text-black">
    <div id="app" class="max-w-md mx-auto p-4">

        <!-- Header -->
        <div class="mb-4">
            <h1 class="text-2xl font-bold">Pocket Utility</h1>
            <p class="text-sm text-gray-600">Mini tools for daily use</p>
            <div class="h-1 w-16 bg-yellow-400 mt-2"></div>
        </div>

        <!-- Search -->
        <input
            v-model="search"
            @keydown.enter.prevent="openFirst"
            type="text"
            placeholder="Search tools..."
            class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400"
        />

        <!-- Category chips -->
        <div class="flex flex-wrap gap-2 mt-3">
            <button
                v-for="cat in categories"
                :key="cat"
                @click="toggleCategory(cat)"
                class="text-xs px-3 py-1 rounded-full border transition"
                :class="selectedCategories.includes(cat)
                    ? 'bg-yellow-400 border-yellow-400 text-black'
                    : 'bg-white border-gray-300 text-gray-600'"
            >
                {{ cat }}
            </button>
        </div>

        <!-- Results count -->
        <div class="mt-2 text-xs text-gray-500" v-if="search || selectedCategories.length">
            {{ filteredItems.length }} result(s)
        </div>

        <!-- List -->
        <div class="mt-4 space-y-3">

            <div v-if="filteredItems.length === 0" class="text-sm text-gray-400 p-4 border rounded-xl">
                No tools match your search.
            </div>

            <a
                v-for="item in filteredItems"
                :key="item.name"
                :href="item.link"
                class="block p-4 rounded-xl border border-gray-200 hover:border-yellow-400 active:scale-[0.99] transition"
            >
                <div class="flex justify-between items-center">
                    <h2 class="font-semibold">{{ item.name }}</h2>
                    <span class="text-xs bg-yellow-400 text-black px-2 py-1 rounded-full">
                        open
                    </span>
                </div>

                <p class="text-sm text-gray-600 mt-1">
                    {{ item.desc }}
                </p>

                <!-- tags -->
                <div class="mt-2 flex flex-wrap gap-1">
                    <span
                        v-for="tag in item.tags"
                        :key="tag"
                        class="text-[10px] px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full"
                    >
                        {{ tag }}
                    </span>
                </div>
            </a>
        </div>

    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    search: "",
                    selectedCategories: [],

                    items: [
                        { name: "Juz Amma Tracker", link: "amma.html", desc: "Track memorization progress of Juz Amma daily.", tags: ["religion", "tracking"] },
                        { name: "Upwork Job Search", link: "upwork-search.html", desc: "Generate Upwork search URLs with filters.", tags: ["freelance", "productivity"] },
                        { name: "Baby Pee/Poo Tracker", link: "baby-pp-tracker.html", desc: "Log baby's bathroom habits.", tags: ["health", "tracking"] },
                        { name: "Mindset Changer", link: "mindset-changer.html", desc: "Quick mindset shifts for motivation.", tags: ["mindset", "productivity"] },
                        { name: "Time Perception Tracker", link: "time-perception.html", desc: "Compare estimated vs actual time.", tags: ["productivity", "tracking"] },
                        { name: "Focus Log", link: "focus-log.html", desc: "Track focus and distraction moments.", tags: ["productivity", "tracking"] },
                        { name: "Decision Helper Wheel", link: "decision.html", desc: "Random decision wheel tool.", tags: ["utility", "fun"] },
                        { name: "Tooth Timer", link: "tooth-timer.html", desc: "2-minute brushing timer.", tags: ["health", "utility"] },
                        { name: "Small Start", link: "small-start.html", desc: "Break procrastination with small steps.", tags: ["mindset", "productivity"] },
                        { name: "First Ayah", link: "first-ayah.html", desc: "Memorize the first ayah of each surat in Juz Amma.", tags: ["religion", "memorization"] }
                    ]
                };
            },

            computed: {
                categories() {
                    const set = new Set();
                    this.items.forEach(i => i.tags.forEach(t => set.add(t)));
                    return Array.from(set);
                },

                filteredItems() {
                    let result = this.items;

                    // search filter
                    if (this.search.trim()) {
                        const q = this.search.toLowerCase().trim().split(/\s+/);

                        result = result
                            .map(item => {
                                const haystack = (item.name + " " + item.desc + " " + item.tags.join(" ")).toLowerCase();

                                const score = q.reduce((acc, word) =>
                                    acc + (haystack.includes(word) ? 1 : 0), 0);

                                return { ...item, score };
                            })
                            .filter(i => i.score > 0)
                            .sort((a, b) => b.score - a.score);
                    }

                    // category filter
                    if (this.selectedCategories.length) {
                        result = result.filter(item =>
                            this.selectedCategories.every(cat => item.tags.includes(cat))
                        );
                    }

                    return result;
                }
            },

            methods: {
                toggleCategory(cat) {
                    if (this.selectedCategories.includes(cat)) {
                        this.selectedCategories = this.selectedCategories.filter(c => c !== cat);
                    } else {
                        this.selectedCategories.push(cat);
                    }
                },

                openFirst() {
                    if (this.filteredItems.length > 0) {
                        window.location.href = this.filteredItems[0].link;
                    }
                }
            }
        }).mount("#app");
    </script>

</body>
</html>
